<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>🎮 Game Voice Helper</title>
<style>
  :root { color-scheme: dark; }
  * { box-sizing: border-box; }
  body {
    margin: 0; padding: 24px; min-height: 100vh;
    font-family: system-ui, -apple-system, sans-serif;
    background: #0d1117; color: #e6edf3;
    display: flex; flex-direction: column; align-items: center; gap: 18px;
  }
  h1 { margin: 0; font-size: 1.5rem; }
  .sub { color: #8b949e; margin: 0; font-size: .9rem; }
  .card {
    width: 100%; max-width: 720px; background: #161b22;
    border: 1px solid #30363d; border-radius: 12px; padding: 16px;
    display: flex; flex-direction: column; gap: 12px;
  }
  label { font-size: .8rem; color: #8b949e; }
  input[type=text] {
    width: 100%; padding: 10px 12px; border-radius: 8px;
    border: 1px solid #30363d; background: #0d1117; color: #e6edf3; font-size: .95rem;
  }
  button {
    padding: 10px 16px; border-radius: 8px; border: 1px solid #30363d;
    background: #21262d; color: #e6edf3; font-size: .95rem; cursor: pointer;
  }
  button:hover { background: #30363d; }
  button.primary { background: #1f6feb; border-color: #1f6feb; }
  button.primary:hover { background: #388bfd; }
  button:disabled { opacity: .45; cursor: not-allowed; }
  .row { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; }
  .grow { flex: 1; min-width: 180px; }
  #frame {
    width: 100%; border-radius: 8px; background: #010409; aspect-ratio: 16/9;
    object-fit: contain; border: 1px solid #30363d;
  }
  .modes { display: flex; gap: 8px; flex-wrap: wrap; }
  .modes button.active { background: #1f6feb; border-color: #1f6feb; }
  #ptt {
    width: 130px; height: 130px; border-radius: 50%; font-size: 2.4rem;
    align-self: center; border: 3px solid #30363d; background: #21262d;
    transition: transform .1s, background .2s;
  }
  #ptt.listening { background: #da3633; border-color: #f85149; transform: scale(1.08); }
  #hfBtn.active { background: #238636; border-color: #2ea043; }
  #svar {
    min-height: 60px; padding: 12px; border-radius: 8px; background: #0d1117;
    border: 1px solid #30363d; white-space: pre-wrap; line-height: 1.5;
  }
  .status { font-size: .8rem; color: #8b949e; }
  .dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; background: #f85149; margin-right: 6px; }
  .dot.on { background: #3fb950; }
</style>
</head>
<body>
  <h1>🎮 Game Voice Helper</h1>
  <p class="sub">Prata med AI:n medan du spelar — den ser din stream och svarar med röst.</p>

  <div class="card">
    <label>Twitch-stream (din PS5-livestream)</label>
    <div class="row">
      <input type="text" id="twitchUrl" class="grow" placeholder="https://www.twitch.tv/dittkanalnamn">
      <button id="startBtn" class="primary">Starta</button>
      <button id="stopBtn">Stoppa</button>
    </div>
    <div class="status"><span class="dot" id="streamDot"></span><span id="streamStatus">Ingen ström ansluten</span></div>
    <img id="frame" alt="Senaste bildrutan visas här" src="">
    <div class="row">
      <label class="grow">…eller ladda upp en skärmbild manuellt:</label>
      <input type="file" id="shotFile" accept="image/*">
    </div>
  </div>

  <div class="card">
    <label>Läge</label>
    <div class="modes">
      <button data-mode="ledtrad" class="active">💡 Ledtråd</button>
      <button data-mode="direkt">🎯 Direkt svar</button>
      <button data-mode="kontroller">🎮 Kontroller & hjälp</button>
    </div>

    <button id="ptt" title="Håll intryckt och prata">🎙️</button>
    <div class="status" id="pttStatus" style="text-align:center">Håll knappen intryckt och ställ din fråga (svenska)</div>

    <div class="row">
      <button id="hfBtn" title="Plattan lyssnar hela tiden — säg väckningsfrasen följt av din fråga">🎧 Handsfree: av</button>
      <input type="text" id="wakePhrase" class="grow" placeholder="Väckningsfras" title="Frasen som väcker AI:n, t.ex. 'hej kompis'">
    </div>
    <div class="status" id="hfStatus" style="text-align:center"></div>

    <div class="row">
      <input type="text" id="textFraga" class="grow" placeholder="…eller skriv din fråga här">
      <button id="sendBtn" class="primary">Fråga</button>
    </div>

    <label>Svar</label>
    <div id="svar">–</div>
    <div class="row">
      <button id="repeatBtn">🔊 Läs upp igen</button>
      <span class="status" id="bildkalla"></span>
    </div>
  </div>

<script>
let mode = "ledtrad";
let lastSvar = "";
let uploadedB64 = null;

const $ = id => document.getElementById(id);

// ---------- Lägen ----------
document.querySelectorAll(".modes button").forEach(b => {
  b.onclick = () => {
    document.querySelectorAll(".modes button").forEach(x => x.classList.remove("active"));
    b.classList.add("active");
    mode = b.dataset.mode;
  };
});

// ---------- Stream ----------
$("startBtn").onclick = async () => {
  const url = $("twitchUrl").value.trim();
  if (!url) return alert("Klistra in din Twitch-URL först.");
  $("streamStatus").textContent = "Ansluter…";
  const r = await fetch("/api/stream/start", {
    method: "POST", headers: {"Content-Type": "application/json"},
    body: JSON.stringify({url})
  });
  if (!r.ok) {
    const e = await r.json().catch(() => ({}));
    $("streamStatus").textContent = "Fel: " + (e.detail || r.status);
    return;
  }
  $("streamStatus").textContent = "Ansluten — hämtar bildrutor…";
};

$("stopBtn").onclick = async () => {
  await fetch("/api/stream/stop", {method: "POST"});
  $("streamStatus").textContent = "Stoppad";
};

// Poll status + förhandsvisning av senaste bildrutan
setInterval(async () => {
  try {
    const s = await (await fetch("/api/status")).json();
    const fresh = s.running && s.frame_age_s !== null && s.frame_age_s < 30;
    $("streamDot").classList.toggle("on", fresh);
    if (fresh) {
      $("streamStatus").textContent = `Live — bildruta ${Math.round(s.frame_age_s)}s gammal`;
      $("frame").src = "/api/frame?t=" + Date.now();
    }
  } catch {}
}, 3000);

// ---------- Skärmbildsuppladdning ----------
$("shotFile").onchange = () => {
  const f = $("shotFile").files[0];
  if (!f) { uploadedB64 = null; return; }
  const reader = new FileReader();
  reader.onload = () => {
    uploadedB64 = reader.result;         // data-URL, servern klipper prefixet
    $("frame").src = reader.result;      // visa direkt
    $("bildkalla").textContent = "Använder uppladdad skärmbild för nästa fråga";
  };
  reader.readAsDataURL(f);
};

// ---------- Fråga ----------
async function ask(fraga) {
  if (!fraga.trim()) return;
  $("svar").textContent = "Tänker…";
  const body = {fraga, mode, screenshot_b64: uploadedB64, use_stream: true};
  uploadedB64 = null; $("shotFile").value = "";
  try {
    const r = await fetch("/api/ask", {
      method: "POST", headers: {"Content-Type": "application/json"},
      body: JSON.stringify(body)
    });
    const data = await r.json();
    if (!r.ok) throw new Error(data.detail || r.status);
    lastSvar = data.svar;
    $("svar").textContent = data.svar;
    $("bildkalla").textContent = {twitch: "📺 Såg din stream", uppladdad: "🖼️ Såg din skärmbild", ingen: "👁️ Ingen bild — svarade blint"}[data.bildkalla] || "";
    speak(data.svar);
  } catch (e) {
    $("svar").textContent = "Fel: " + e.message;
  }
}

$("sendBtn").onclick = () => ask($("textFraga").value);
$("textFraga").onkeydown = e => { if (e.key === "Enter") ask($("textFraga").value); };
$("repeatBtn").onclick = () => speak(lastSvar);

// ---------- Text-till-tal (svenska) ----------
// Pausar handsfree-lyssningen medan svaret läses upp, annars hör mikrofonen sitt eget svar.
function speak(text) {
  if (!text || !window.speechSynthesis) return;
  speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text);
  u.lang = "sv-SE";
  u.volume = 1;
  const sv = speechSynthesis.getVoices().find(v => v.lang.startsWith("sv"));
  if (sv) u.voice = sv;
  u.onstart = () => { speaking = true; hfStop(); };
  u.onend = u.onerror = () => { speaking = false; if (hfOn) hfStart(); };
  speechSynthesis.speak(u);
}

// ---------- Push-to-talk (Web Speech API, sv-SE) ----------
const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
let rec = null;
if (SR) {
  rec = new SR();
  rec.lang = "sv-SE";
  rec.interimResults = true;
  rec.continuous = false;

  let transcript = "";
  rec.onresult = e => {
    transcript = Array.from(e.results).map(r => r[0].transcript).join(" ");
    $("pttStatus").textContent = "🎙️ " + transcript;
  };
  rec.onend = () => {
    $("ptt").classList.remove("listening");
    if (transcript.trim()) {
      $("textFraga").value = transcript;
      ask(transcript);
    } else {
      $("pttStatus").textContent = "Hörde inget — prova igen";
    }
    transcript = "";
    if (hfOn && !speaking) hfStart();  // återuppta handsfree-lyssningen
  };
  rec.onerror = e => { $("pttStatus").textContent = "Mikrofonfel: " + e.error; };

  const start = e => { e.preventDefault(); hfStop(); transcript = ""; $("ptt").classList.add("listening"); $("pttStatus").textContent = "Lyssnar…"; try { rec.start(); } catch {} };
  const stop  = e => { e.preventDefault(); try { rec.stop(); } catch {} };
  $("ptt").addEventListener("mousedown", start);
  $("ptt").addEventListener("mouseup", stop);
  $("ptt").addEventListener("touchstart", start, {passive: false});
  $("ptt").addEventListener("touchend", stop);
} else {
  $("ptt").disabled = true;
  $("pttStatus").textContent = "Röstinmatning stöds inte i denna webbläsare (använd Chrome/Edge) — skriv frågan istället.";
}

// ---------- Handsfree-läge (väckningsfras — för VR: ingen knapp behövs) ----------
// Plattan lyssnar kontinuerligt. Säg väckningsfrasen + frågan i ett svep
// ("hej kompis, hur öppnar jag dörren?") eller bara frasen och vänta på "Ja?".
let hfOn = false;        // handsfree-läget aktivt
let hfArmed = false;     // väckningsfras hörd, nästa mening är frågan
let hfArmTimer = null;
let hfRec = null;
let speaking = false;    // TTS pågår — lyssna inte på oss själva

$("wakePhrase").value = localStorage.getItem("wakePhrase") || "hej kompis";
$("wakePhrase").onchange = () => {
  localStorage.setItem("wakePhrase", $("wakePhrase").value);
  if (hfOn) hfIdleStatus();
};

const norm = s => s.toLowerCase().replace(/[.,!?;:]/g, " ").replace(/\s+/g, " ").trim();

function beep(freq = 880) {
  try {
    const ctx = beep.ctx || (beep.ctx = new (window.AudioContext || window.webkitAudioContext)());
    const o = ctx.createOscillator(), g = ctx.createGain();
    o.frequency.value = freq; o.connect(g); g.connect(ctx.destination);
    g.gain.setValueAtTime(0.2, ctx.currentTime);
    o.start(); o.stop(ctx.currentTime + 0.12);
  } catch {}
}

function hfIdleStatus() { $("hfStatus").textContent = `Väntar på "${$("wakePhrase").value.trim() || "hej kompis"}"…`; }

function hfHandleFinal(text) {
  if (hfArmed) {
    clearTimeout(hfArmTimer); hfArmed = false;
    beep(660); hfIdleStatus();
    ask(text.trim());
    return;
  }
  const phrase = norm($("wakePhrase").value) || "hej kompis";
  const t = norm(text);
  const i = t.indexOf(phrase);
  if (i === -1) return;
  const fraga = t.slice(i + phrase.length).trim();
  if (fraga.length > 2) {
    beep(660);
    ask(fraga);
  } else {
    // Bara frasen — bekräfta med röst och vänta på frågan
    hfArmed = true;
    $("hfStatus").textContent = "Lyssnar på din fråga…";
    speak("Ja?");
    hfArmTimer = setTimeout(() => { hfArmed = false; hfIdleStatus(); }, 12000);
  }
}

function hfStart() {
  if (!SR || hfRec || !hfOn || speaking) return;
  hfRec = new SR();
  hfRec.lang = "sv-SE";
  hfRec.continuous = true;
  hfRec.interimResults = true;
  hfRec.onresult = e => {
    for (let i = e.resultIndex; i < e.results.length; i++) {
      if (e.results[i].isFinal) hfHandleFinal(e.results[i][0].transcript);
    }
  };
  // Chrome avslutar kontinuerlig igenkänning då och då — starta om tyst
  hfRec.onend = () => { hfRec = null; setTimeout(hfStart, 400); };
  hfRec.onerror = e => {
    if (e.error === "not-allowed" || e.error === "service-not-allowed") {
      hfToggle(false);
      $("hfStatus").textContent = "Mikrofontillstånd saknas — tillåt mikrofonen i Chrome och slå på igen.";
    }
  };
  try { hfRec.start(); } catch {}
}

function hfStop() {
  const r = hfRec; hfRec = null;
  if (r) { r.onend = null; try { r.stop(); } catch {} }
}

function hfToggle(state) {
  hfOn = state === undefined ? !hfOn : state;
  $("hfBtn").classList.toggle("active", hfOn);
  $("hfBtn").textContent = hfOn ? "🎧 Handsfree: på" : "🎧 Handsfree: av";
  if (hfOn) { hfArmed = false; beep(880); hfIdleStatus(); hfStart(); }
  else { clearTimeout(hfArmTimer); hfArmed = false; hfStop(); $("hfStatus").textContent = ""; }
}

$("hfBtn").onclick = () => hfToggle();
if (!SR) $("hfBtn").disabled = true;
</script>
</body>
</html>
